 <!DOCTYPE html>
  <html lang="en">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0">
      <title>ClearSpend | Local Budget Master</title>
      <script src="https://cdn.tailwindcss.com"></script>
      <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
      <style>
          body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
          .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid #e2e8f0; }
          .input-field { @apply w-full p-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-indigo-500 transition-all; }
      </style>
  </head>
  <body class="text-slate-900 min-h-screen">

      <!-- Header -->
      <nav class="bg-white border-b border-slate-200 px-6 py-4 flex justify-between items-center sticky top-0 z-50">
          <div class="flex items-center gap-2">
              <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center text-white font-bold">₵</div>
              <span class="text-xl font-extrabold tracking-tight">ClearSpend<span class="text-indigo-600">.io</span></span>
          </div>
          <button onclick="clearAllData()" class="text-xs font-bold text-red-500 hover:text-red-700 transition">Reset All Data</button>
      </nav>

      <main class="p-4 md:p-10 max-w-6xl mx-auto">

          <!-- Top Stats Grid -->
          <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
              <div class="glass p-6 rounded-3xl shadow-sm border-l-4 border-emerald-500">
                  <p class="text-slate-500 text-xs font-bold uppercase mb-1">Total Monthly Income</p>
                  <h2 class="text-3xl font-black text-slate-800" id="displayIncome">₹0</h2>
              </div>
              <div class="glass p-6 rounded-3xl shadow-sm border-l-4 border-red-500">
                  <p class="text-slate-500 text-xs font-bold uppercase mb-1">Total Expenses</p>
                  <h2 class="text-3xl font-black text-slate-800" id="displayExpenses">₹0</h2>
              </div>
              <div class="glass p-6 rounded-3xl shadow-sm border-l-4 border-indigo-500">
                  <p class="text-slate-500 text-xs font-bold uppercase mb-1">Safe-to-Spend</p>
                  <h2 class="text-3xl font-black text-indigo-600" id="displayBalance">₹0</h2>
              </div>
          </div>

          <div class="grid grid-cols-1 lg:grid-cols-2 gap-10">
              <!-- Input Section -->
              <div class="space-y-8">
                  <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                      <h3 class="text-lg font-bold mb-6 flex items-center gap-2">💰 Set Your Income</h3>
                      <div class="flex gap-3">
                          <input type="number" id="incomeInput" placeholder="Enter monthly income" class="input-field">
                          <button onclick="updateIncome()" class="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold hover:bg-indigo-700 transition">Set</button>
                      </div>
                  </div>

                  <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200">
                      <h3 class="text-lg font-bold mb-6 flex items-center gap-2">📉 Add Expense</h3>
                      <div class="space-y-4">
                          <div class="grid grid-cols-2 gap-4">
                              <input type="text" id="expName" placeholder="Expense name (e.g. Rent)" class="input-field">
                              <input type="number" id="expAmount" placeholder="Amount" class="input-field">
                          </div>
                          <div class="grid grid-cols-2 gap-4">
                              <select id="expCat" class="input-field">
                                  <option value="Housing">🏠 Housing</option>
                                  <option value="Food">🍔 Food</option>
                                  <option value="Transport">🚗 Transport</option>
                                  <option value="Entertainment">🎮 Entertainment</option>
                                  <option value="Other">📦 Other</option>
                              </select>
                              <button onclick="addExpense()" class="bg-indigo-600 text-white rounded-xl font-bold hover:bg-indigo-700 transition">Add Expense</button>
                          </div>
                      </div>
                  </div >
              </div>

              <!-- Visuals Section -->
              <div class="space-y-6">
                  <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200 h-full">
                      <h3 class="text-lg font-bold mb-6">Spending Distribution</h3>
                      <div class="h-64 flex items-center justify-center">
                          <canvas id="expenseChart"></canvas>
                      </div>
                      <div class="mt-8 space-y-3" id="expenseList">
                          <!-- Expenses injected here -->
                      </div>
                  </div >
              </div >
          </div >
      </main>

      <script>
          let state = JSON.parse(localStorage.getItem('clearSpendData')) || {
              income: 0,
              expenses: []
          };

          let myChart;

          function save() {
              localStorage.setItem('clearSpendData', JSON.stringify(state));
              updateUI();
          }

          function updateIncome() {
              const val = document.getElementById('incomeInput').value;
              if(!val) return;
              state.income = parseFloat(val);
              save();
              document.getElementById('incomeInput').value = '';
          }

          function addExpense() {
              const name = document.getElementById('expName').value;
              const amt = document.getElementById('expAmount').value;
              const cat = document.getElementById('expCat').value;

              if(!name || !amt) return alert("Fill all fields");

              state.expenses.push({ name, amt: parseFloat(amt), cat });
              save();

              document.getElementById('expName').value = '';
              document.getElementById('expAmount').value = '';
          }

          function deleteExpense(index) {
              state.expenses.splice(index, 1);
              save();
          }

          function clearAllData() {
              if(confirm("Reset all your budget data?")) {
                  state = { income: 0, expenses: [] };
                  save();
              }
          }

          function updateUI() {
              const totalExp = state.expenses.reduce((sum, exp) => sum + exp.amt, 0);
              const balance = state.income - totalExp;

              document.getElementById('displayIncome').innerText = `₹${state.income.toLocaleString()}`;
              document.getElementById('displayExpenses').innerText = `₹${totalExp.toLocaleString()}`;
              document.getElementById('displayBalance').innerText = `₹${balance.toLocaleString()}`;
              document.getElementById('displayBalance').className = balance >= 0 ? "text-3xl font-black text-indigo-600" : "text-3xl font-black text-red-600";

              // Update List
              const list = document.getElementById('expenseList');
              list.innerHTML = state.expenses.map((exp, i) => `
                  <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl border border-slate-100">
                      <div>
                          <p class="text-sm font-bold">${exp.name}</p>
                          <p class="text-[10px] text-slate-400 uppercase">${exp.cat}</p>
                      </div>
                      <div class="flex items-center gap-4">
                          <span class="font-bold text-sm">₹${exp.amt}</span>
                          <button onclick="deleteExpense(${i})" class="text-red-400 hover:text-red-600 text-lg">×</button>
                      </div>
                  </div >
              `).join('');

              updateChart();
          }

          function updateChart() {
              const catTotals = {};
              state.expenses.forEach(exp => {
                  catTotals[exp.cat] = (catTotals[exp.cat] || 0) + exp.amt;
              });

              const ctx = document.getElementById('expenseChart').getContext('2d');

              if(myChart) myChart.destroy();

              myChart = new Chart(ctx, {
                  type: 'doughnut',
                  data: {
                      labels: Object.keys(catTotals),
                      datasets: [{
                          data: Object.values(catTotals),
                          backgroundColor: ['#6366f1', '#f43f5e', '#10b981', '#f59e0b', '#8b5cf6'],
                          borderWidth: 0
                      }]
                  },
                  options: {
                      responsive: true,
                      maintainAspectRatio: false,
                      plugins: { legend: { position: 'bottom', labels: { color: '#94a3b8', font: { size: 10 } } } }
                  }
              });
          }

          // Initial Load
          updateUI();
      </script>
  </body>
  </html>
